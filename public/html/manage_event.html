<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Event</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/manage_event.css">
</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<header>
    <div class="logo">Manage Event</div>
</header>

<section class="hero">
    <h1 class="gradient" id="manageEventTitle"></h1>
</section>
<div class="glass-box" style="margin:30px;">
    <h2>Send Announcement</h2>

    <form id="announcementForm">
        <textarea id="announcementText"
            placeholder=" Write announcement..." 
            style="width:100%; height:100px; border-radius:10px; text-align: center;background: transparent; color: white; resize:none;"
            required></textarea><br><br>

        <button class="btn-primary" type="submit">
            Send Announcement
        </button>
    </form>

    <p id="announcementMessage" style="margin-top:10px;"></p>
</div>
<div class="Search-box">
    <input id="searchParticipants" placeholder="Search Participants....">
</div>
<section class="container">

    <div class="manage-grid">


        <!-- Participants Box -->
        <div class="glass-box">
            <h2>Participants</h2>
            <div id="participantsContainer"></div>
        </div>

    </div>

</section>
<script src="../js/manage_events.js"></script>

</body>
</html>
