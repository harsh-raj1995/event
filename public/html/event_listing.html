<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Projects</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/listing.css">
</head>

<body>

<!-- ================= BLUR BACKGROUND ================= -->
<div class="blur1"></div>
<div class="blur2"></div>

<!-- ================= LOADER ================= -->
<div class="loader" id="loader">
    <p>Loading projects…</p>
</div>

<!-- ================= HEADER ================= -->
<header>
    <div class="logo">Event Management</div>

    <form class="search-form">
        <input type="search" placeholder="Search events">
        <button type="submit">Search</button>
    </form>
    <img src="../icon/bell.png" class="icon" onclick="location.href='notification.html'" style="margin-left: 200px;">
    <button class="add-btn">
        Profile
        <img src="../icon/profile.png" class="profile-img">
    </button>
</header>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
    <h2>Menu</h2>
    <ul>
        <li  onclick="location.href='dashboard.html'">
            🏠 Dashboard
        </li>

        <li onclick="location.href='create.html'">
            ➕ Create Event
        </li>

        <li onclick="location.href='my_events.html'">
            📂 My Events
        </li>
        <li onclick="location.href='calender.html'">
            🗓️ Calendar
        </li>
        <li onclick="location.href='event_listing.html'">
            🌍 All Events
        </li>

        <li onclick="location.href='notification.html'">
            🔔 Notifications
        </li>

        <li onclick="location.href='profile.html'">
            👤 Profile
        </li>

        <li onclick="location.href='index.html'">
            🚪 Logout
        </li>
    </ul>
</aside>

<!-- ================= MAIN ================= -->
<main class="main">

    <!-- ================= HERO ================= -->
    <section class="hero">
        <h1 class="gradient">Ongoing Events</h1>
        <p>Innovative experiences crafted for modern organizations</p>
    </section>

    <!-- ================= PROJECTS ================= -->
    <section class="section">
        <div class="cards" id="eventsContainer"></div>
    </section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    © 2026 Event Management Platform
</footer>

<script>
    window.onload = () => {
        setTimeout(() => {
            document.getElementById("loader").style.display = "none";
        }, 1200);
    };
    const currentPage = window.location.pathname.split("/").pop();
    document.querySelectorAll(".sidebar li").forEach(li => {
        if (li.getAttribute("onclick")?.includes(currentPage)) {
            li.classList.add("active");
        }
    });
</script>
<script src="../js/listing.js"></script>
</body>
</html>
