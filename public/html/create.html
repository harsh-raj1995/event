<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Event</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<header>
    <div class="logo">Create Event</div>
</header>

<section class="hero">
    <h1 class="gradient">Create New Event</h1>
</section>

<section style="max-width:700px; margin:auto; padding:40px;">

<form id="createEventForm">

    <input type="text" id="title" placeholder="Event Title" required><br><br>

    <input type="text" id="category" placeholder="Category" required><br><br>

    <input type="text" id="location" placeholder="Location" required><br><br>

    <input type="date" id="date" required><br><br>

    <textarea id="description" placeholder="Description" required
        style="width:100%; height:100px; border-radius:10px;"></textarea><br><br>

    <button class="btn-primary" type="submit">Create Event</button>

</form>

</section>

<script src="../js/create.js"></script>

</body>
</html>
