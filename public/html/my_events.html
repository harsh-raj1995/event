<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Events Calendar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/my_events.css">

<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<header>
    <div class="logo">My Events Calendar</div>
    <button class="btn-primary" onclick="location.href='create.html'">
        + Create Event
    </button>
</header>

<!-- FILTER SECTION -->
<div class="filters">
    <select id="filterCategory">
        <option value="">All Categories</option>
        <option value="Technical">Technical</option>
        <option value="Cultural">Cultural</option>
        <option value="Sports">Sports</option>
    </select>

    <select id="filterType">
        <option value="">All Types</option>
        <option value="created">Created</option>
        <option value="registered">Registered</option>
    </select>

    <select id="filterTime">
        <option value="">All</option>
        <option value="upcoming">Upcoming</option>
        <option value="past">Past</option>
    </select>
</div>

<main class="main">
    <div id="calendar"></div>
</main>

<!-- Modal -->
<div id="eventModal" class="modal hidden">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalDetails"></p>
        <div class="modal-buttons">
            <button id="manageBtn" class="btn-primary">Manage</button>
            <button id="closeModal">Close</button>
        </div>
    </div>
</div>

<script src="../js/my_events.js"></script>

</body>
</html>
